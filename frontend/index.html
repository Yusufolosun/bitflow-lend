    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.stacks.co https://*.hiro.so chrome-extension:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://*.stacks.co https://*.hiro.so https://api.coingecko.com https://*.gateway.dev https://*.bitflowapis.finance ws://localhost:* ws://127.0.0.1:* wss://* chrome-extension:; img-src 'self' data: https: blob: chrome-extension:; frame-src 'self' https:;">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
      body {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        margin: 0;
        padding: 0;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading Screen */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }
      
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-logo {
        width: 56px;
        height: 56px;
        animation: loadPulse 2s cubic-bezier(0.4,0,0.6,1) infinite;
      }
      
      .loading-spinner {
        width: 44px;
        height: 44px;
        border: 3px solid rgba(255,255,255,0.1);
        border-radius: 50%;
        border-top-color: #FF5F00;
        animation: spin 0.8s linear infinite;
      }
      
      .loading-text {
        color: #94A3B8;
        font-size: 0.8125rem;
        font-weight: 500;
        letter-spacing: 0.05em;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes loadPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.96); }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <img src="/logo-dark.svg" alt="BitFlow" class="loading-logo" />
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading BitFlow Lend…</div>
    </div>
    
    <!-- React Root -->
    <div id="root"></div>
    
    <!-- Vite Module Script -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove Loading Screen after App Loads -->
    <script>
      (function() {
        function removeLoadingScreen() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
              loadingScreen.remove();
            }, 300);
          }
        }
        if (document.readyState === 'complete') {
          setTimeout(removeLoadingScreen, 500);
        } else {
          window.addEventListener('load', () => {
            setTimeout(removeLoadingScreen, 500);
          });
          // Failsafe: ensure loading screen is removed even if 'load' event doesn't fire
          setTimeout(removeLoadingScreen, 2000);
        }
      })();
    </script>
  </body>
</html>
