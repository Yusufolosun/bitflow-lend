<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <!-- Icon: Dark circle with stacked diamonds + flow swoosh (dark bg variant) -->
  <circle cx="26" cy="30" r="25" fill="#1E293B"/>
  <!-- Upper isometric diamond -->
  <path d="M26 14 L38 22 L26 30 L14 22 Z" fill="#A0AEC0" opacity="0.6"/>
  <!-- Lower isometric diamond -->
  <path d="M26 22 L38 30 L26 38 L14 30 Z" fill="#A0AEC0" opacity="0.9"/>
  <!-- Orange flow swoosh -->
  <path d="M12 45 C15 40, 18 36, 22 33 C26 30, 28 26, 30 23 C32 20, 35 16, 40 13" stroke="#FF5F00" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Wordmark (light variant for dark backgrounds) -->
  <text x="62" y="40" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="28" fill="#F8FAFC">Bit</text>
  <text x="107" y="40" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="28" fill="#FF5F00">Flow</text>
  <text x="166" y="40" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="28" fill="#94A3B8">Lend</text>
</svg>
